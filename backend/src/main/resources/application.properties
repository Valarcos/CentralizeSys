spring.application.name=CentralizeSys

# 1. Database Connection
# These values are read by our DatabaseConfig.java
spring.datasource.url=jdbc:sqlite:data/centralizesys.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# 2. Initialization (IMPORTANT for JDBC Template)
# DISABLE standard Spring Boot script initialization
# because we handle it manually in DatabaseConfig.java to ensure FK support.
spring.sql.init.mode=never

# --- Logging ---
# Show SQL in console (Critical for debugging manual queries)
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

# --- Encoding (Vital for Spanish: accents, ˝) ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Optional: Continue on error if a table already exists (useful for schema.sql)
spring.sql.init.continue-on-error=true