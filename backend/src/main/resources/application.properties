spring.application.name=CentralizeSys

# 1. Database Connection
spring.datasource.url=jdbc:sqlite:data/centralizesys.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# 2. Initialization (IMPORTANT for JDBC Template)
# This forces Spring to run schema.sql (to create tables) and data.sql (to load data)
# every time the app starts.
spring.sql.init.mode=always

# Optional: Continue on error if a table already exists (useful for schema.sql)
spring.sql.init.continue-on-error=true