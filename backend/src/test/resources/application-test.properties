# --- Database Setup ---
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/centralizesys
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=valarcos
spring.datasource.password=dev_password_123
spring.sql.init.mode=always

# --- Logging (Super helpful for ITs) ---
# See the actual SQL queries running during tests
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
# See transaction management (Commits/Rollbacks)
logging.level.org.springframework.transaction=DEBUG

# --- Encoding ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# --- Mock Secrets for Tests ---
app.jwtSecret=dummy_test_secret_for_jwt_token_generation_1234567890
app.jwtExpirationInMs=3600000
CORS_ALLOWED_ORIGINS=*

spring.sql.init.separator=;;
spring.flyway.validate-on-migrate=false

