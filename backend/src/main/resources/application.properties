spring.application.name=CentralizeSys

# 1. Database Connection
# These values are read by our DatabaseConfig.java
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# 2. Initialization (IMPORTANT for JDBC Template)
# DISABLE standard Spring Boot script initialization
# because we handle it manually in DatabaseConfig.java to ensure FK support.
spring.sql.init.mode=always
spring.jpa.hibernate.ddl-auto=validate

# --- Logging ---
# Show SQL in console (Critical for debugging manual queries)
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG

# Saves logs to a file named 'app.log' in the 'logs' folder
logging.file.name=logs/app.log
# Optional: Rotate logs so they don't get too huge (10MB max, keep last 7 files)
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7

# --- Encoding (Vital for Spanish: accents, ) ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Optional: Continue on error if a table already exists (useful for schema.sql)
spring.sql.init.continue-on-error=true

# --- Security / JWT ---
# Secret Key (Must be very long for HS512, at least 512 bits)
# In Production: Set JWT_SECRET environment variable.
# The application will fail to start without it (intentional security design).
app.jwtSecret=${JWT_SECRET}

# Token Expiration (Default: 7 days in milliseconds)
# In Production: Set JWT_EXPIRATION_MS environment variable.
# 1 day = 86400000, 7 days = 604800000
app.jwtExpirationInMs=${JWT_EXPIRATION_MS:604800000}

# --- CORS Configuration ---
# Comma-separated list of allowed origins.
# Use specific URLs for production (e.g., https://myapp.com).
# For LAN access, add http://192.168.x.x:3000
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:\
    http://localhost:3000,\
    http://localhost:5173,\
    https://*.trycloudflare.com,\
    https://*.centralizesys.com}

spring.sql.init.separator=;;