name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read
  checks: write

jobs:
  build-and-analyze:
    name: Build, Test & Analyze
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: valarcos
          POSTGRES_PASSWORD: dev_password_123
          POSTGRES_DB: centralizesys
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required for SonarCloud analysis

      # 2. Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3.1. Setup Gradle (Handles Caching & Dependencies)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: "backend"
          # 3.2. Enable build scan (optional)
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      # 4. Ensure gradlew is executable (from File B)
      - name: Make gradlew executable
        run: chmod +x backend/gradlew

      # 5. Build & Test + generate coverage
      - name: Run tests with coverage
        working-directory: backend
        run: ./gradlew test jacocoTestReport
      #      The following block was the original. It was commented because running ./gradlew test
      #      already depends on compilation and fails if there are errors in the code.
      #      ./gradlew build would be useful if I was building a docker image, deploying an artifact
      #      or uploading the JAR somewhere. This is based on AI recommendation, be mindful of that.
      #      - name: Build with Gradle
      #        working-directory: backend
      #        run: ./gradlew build

      # 6. SonarCloud Analysis
      - name: SonarCloud Analyze
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

      # 7. Upload Test Reports
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-junit
          path: backend/build/test-results/test/