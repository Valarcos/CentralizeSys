# --- Database Setup ---
# We intentionally leave out spring.datasource.url!
# Why? Because TestDatabaseConfig.java handles the connection string (jdbc:sqlite::memory:) explicitly.
# Leaving it out here guarantees we don't accidentally connect to a file.

# Disable standard initialization (we use our own Populator in TestDatabaseConfig)
spring.sql.init.mode=never

# --- Logging (Super helpful for ITs) ---
# See the actual SQL queries running during tests
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
# See transaction management (Commits/Rollbacks)
logging.level.org.springframework.transaction=DEBUG

# --- Encoding ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true