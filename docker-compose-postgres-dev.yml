version: '3.8'

# This file defines the "containers" that Docker will run for our application.
# Right now, we only need a PostgreSQL database container.
services:
  db:
    # We use the official PostgreSQL image based on Alpine Linux (very lightweight).
    # Version 16 is modern and stable.
    image: postgres:16-alpine
    container_name: centralizesys_postgres
    restart: always # Automatically restart if it crashes or the PC reboots

    # Environment variables are how we pass configuration to the container.
    # We use an env_file so secrets are not hardcoded in this file.
    # The file .env will live in the backend directory.
    env_file:
      - ./backend/.env

    # Ports mapping: "HostPort:ContainerPort"
    # 5432 is the standard PostgreSQL port. This maps your Windows PC's 5432 to the container's 5432.
    ports:
      - "5432:5432"

    # Volumes are critical! They map a folder inside the container to a permanent location.
    # Without this, all data is lost when the container stops.
    volumes:
      # We map a named volume "postgres_data" to the internal PostgreSQL data directory.
      - postgres_data:/var/lib/postgresql/data
      # Let PostgreSQL natively initialize the schema
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

# Declare the named volume so Docker knows to create and manage it on your Windows host.
volumes:
  postgres_data:
